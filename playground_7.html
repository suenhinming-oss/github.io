<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q版海洋樂園</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky1:#BEE8FF; --sky2:#FFFFFF;
    --candy-pink:#FF9EC4; --sun-yellow:#FFD166; --ocean-teal:#2FB4C9;
    --leaf:#5FC98D; --ink:#3A3552;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:'Baloo 2',sans-serif;color:var(--ink);}
  #gameCanvas{display:block;width:100%;height:100%;}

  /* ---- Upload / start screen ---- */
  #startScreen{
    position:fixed;inset:0;z-index:20;
    background:radial-gradient(circle at 30% 20%, #FFF7E6 0%, var(--sky1) 55%, #9FD8FF 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;text-align:center;
  }
  #startScreen h1{
    font-size:clamp(28px,5vw,44px); font-weight:800; margin:0 0 6px;
    color:var(--ink); text-shadow:3px 3px 0 #fff, 0 0 18px rgba(255,255,255,.6);
    letter-spacing:1px;
  }
  #startScreen p.sub{margin:0 0 26px;font-size:16px;font-weight:500;color:#5b5578;}
  .card{
    background:#fff; border-radius:28px; padding:28px 30px; width:min(420px,90vw);
    box-shadow:0 18px 40px rgba(80,60,120,.18);
    display:flex;flex-direction:column;align-items:center;gap:16px;
  }
  #dropZone{
    width:180px;height:180px;border-radius:50%;
    border:4px dashed var(--ocean-teal);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer; position:relative; overflow:hidden;
    background:#F6F1FF; transition:transform .15s ease, border-color .15s ease;
  }
  #dropZone:hover{transform:scale(1.03); border-color:var(--candy-pink);}
  #dropZone span{font-size:13px;font-weight:700;color:#8b7fb8;padding:0 14px;}
  #previewImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
  #fileInput{display:none;}
  .hint{font-size:12px;color:#8b83a3;font-weight:500;}
  #startBtn{
    margin-top:6px; padding:14px 40px; border:none;border-radius:999px;
    background:linear-gradient(135deg, var(--ocean-teal), #1E93A8);
    color:#fff; font-family:'Baloo 2',sans-serif; font-weight:800; font-size:18px;
    cursor:pointer; box-shadow:0 8px 0 #187E92, 0 12px 20px rgba(47,180,201,.35);
    transition:transform .1s ease, box-shadow .1s ease; opacity:.5; pointer-events:none;
  }
  #startBtn.ready{opacity:1;pointer-events:auto;}
  #startBtn:active{transform:translateY(6px); box-shadow:0 2px 0 #187E92;}

  /* ---- In-game UI ---- */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:none;font-weight:700;}
  #topBar{
    position:absolute;top:16px;left:16px;right:16px;
    display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
  }
  #title{
    background:rgba(255,255,255,.9); padding:10px 22px;border-radius:999px;
    font-weight:800;font-size:18px;box-shadow:0 4px 14px rgba(80,60,120,.18);
    border:3px solid #FFD9EC;
  }
  #controls{
    background:rgba(255,255,255,.9); padding:10px 18px;border-radius:18px;
    font-size:13px;line-height:1.6;font-weight:700;box-shadow:0 4px 14px rgba(80,60,120,.18);
    max-width:210px; border:3px solid #E4F6FF;
  }
  #prompt{
    position:absolute;left:50%;bottom:14%;transform:translateX(-50%) translateY(10px) scale(.9);
    background:linear-gradient(135deg,#2FB4C9,#1E93A8); color:#fff; padding:16px 30px;border-radius:999px;
    font-size:19px; font-weight:800; opacity:0; transition:opacity .2s ease, transform .2s ease;
    white-space:nowrap; box-shadow:0 10px 24px rgba(224,83,140,.4), 0 0 0 4px #fff inset;
    pointer-events:auto; cursor:pointer;
  }
  #prompt.show{opacity:1; transform:translateX(-50%) translateY(0) scale(1);}
  #prompt kbd{
    background:#fff;color:var(--ink);border-radius:8px;padding:2px 10px;margin:0 4px;font-size:16px;
    box-shadow:0 2px 0 #ddd;
  }
</style>
</head>
<body>

<div id="startScreen">
  <h1>🐬 我的Q版海洋樂園</h1>
  <p class="sub">上傳一張圖畫，變成你的專屬角色，一起去遊樂場玩吧！</p>
  <div class="card">
    <div id="dropZone">
      <span>點這裡上傳<br>你的圖畫</span>
      <img id="previewImg" alt="preview">
    </div>
    <input type="file" id="fileInput" accept="image/*">
    <div class="hint">建議上傳清楚的正面圖畫或照片</div>
    <button id="startBtn">開始遊玩 →</button>
  </div>
</div>

<div id="hud">
  <div id="topBar">
    <div id="title">🐬 Q版海洋樂園</div>
    <div id="controls">
      ⬆️⬇️⬅️➡️ 移動 / 轉向<br>
      靠近設施按 <kbd style="background:#fff;border-radius:6px;padding:1px 6px;">E</kbd> 或點畫面提示坐上去
    </div>
  </div>
  <div id="prompt"></div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  "use strict";

  /* ===================== UPLOAD SCREEN ===================== */
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const previewImg = document.getElementById('previewImg');
  const startBtn = document.getElementById('startBtn');
  const startScreen = document.getElementById('startScreen');
  const hud = document.getElementById('hud');
  const promptEl = document.getElementById('prompt');

  let faceCanvas = null;

  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        // crop to a centered square for a clean face texture
        const size = Math.min(img.width, img.height);
        const sx = (img.width - size) / 2;
        const sy = (img.height - size) / 2;
        const c = document.createElement('canvas');
        c.width = 512; c.height = 512;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#FFE3C2';
        ctx.fillRect(0,0,512,512);
        ctx.drawImage(img, sx, sy, size, size, 0, 0, 512, 512);
        faceCanvas = c;
        previewImg.src = c.toDataURL();
        previewImg.style.display = 'block';
        startBtn.classList.add('ready');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  startBtn.addEventListener('click', () => {
    if (!faceCanvas) return;
    startScreen.style.display = 'none';
    hud.style.display = 'block';
    initGame(faceCanvas);
  });

  /* ===================== GAME ===================== */
  function initGame(faceCanvasSrc){
    const canvas = document.getElementById('gameCanvas');
    const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xBEE8FF);
    scene.fog = new THREE.Fog(0xCFF0FF, 70, 170);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 500);
    camera.position.set(0, 8, 14);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* ---- Sky dome with soft gradient, sun glow and drifting clouds ---- */
    const cloudGroup = new THREE.Group();
    (function(){
      const skyCanvas = document.createElement('canvas');
      skyCanvas.width = 8; skyCanvas.height = 256;
      const sctx = skyCanvas.getContext('2d');
      const grad = sctx.createLinearGradient(0,0,0,256);
      grad.addColorStop(0, '#6FC6F0');
      grad.addColorStop(0.55, '#BEE8FF');
      grad.addColorStop(1, '#F3FBFF');
      sctx.fillStyle = grad; sctx.fillRect(0,0,8,256);
      const skyTex = new THREE.CanvasTexture(skyCanvas);
      const skyDome = new THREE.Mesh(
        new THREE.SphereGeometry(280,24,16),
        new THREE.MeshBasicMaterial({map:skyTex, side:THREE.BackSide, fog:false})
      );
      scene.add(skyDome);

      // glowing sun
      const sunGlowCanvas = document.createElement('canvas');
      sunGlowCanvas.width = sunGlowCanvas.height = 128;
      const gctx = sunGlowCanvas.getContext('2d');
      const rg = gctx.createRadialGradient(64,64,0,64,64,64);
      rg.addColorStop(0,'rgba(255,247,214,1)');
      rg.addColorStop(0.4,'rgba(255,240,180,0.7)');
      rg.addColorStop(1,'rgba(255,240,180,0)');
      gctx.fillStyle = rg; gctx.fillRect(0,0,128,128);
      const sunSprite = new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(sunGlowCanvas), fog:false, depthWrite:false}));
      sunSprite.scale.set(60,60,1);
      sunSprite.position.set(120,90,-150);
      scene.add(sunSprite);

      // simple drifting cloud puffs
      function makeCloud(){
        const c = new THREE.Group();
        const cm = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.9, fog:false});
        const n = 4 + Math.floor(Math.random()*3);
        for(let i=0;i<n;i++){
          const puff = new THREE.Mesh(new THREE.SphereGeometry(2.2+Math.random()*1.4,10,10), cm);
          puff.position.set(i*2.4 - n*1.1, Math.random()*0.8, Math.random()*1.2);
          c.add(puff);
        }
        return c;
      }
      for(let i=0;i<10;i++){
        const cloud = makeCloud();
        const a = Math.random()*Math.PI*2, r = 60+Math.random()*90;
        cloud.position.set(Math.cos(a)*r, 38+Math.random()*20, Math.sin(a)*r);
        cloud.userData.speed = 0.4 + Math.random()*0.6;
        cloudGroup.add(cloud);
      }
      scene.add(cloudGroup);
    })();

    /* ---- Lights ---- */
    const hemi = new THREE.HemisphereLight(0xffffff, 0x8fd9a8, 1.0);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xfff3d6, 1.05);
    sun.position.set(30, 45, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048,2048);
    sun.shadow.camera.left = -80; sun.shadow.camera.right = 80;
    sun.shadow.camera.top = 80; sun.shadow.camera.bottom = -80;
    sun.shadow.radius = 3;
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xBFE9FF, 0.35);
    fill.position.set(-25,20,-15);
    scene.add(fill);

    /* ---- Ground ---- */
    function makeGrassTexture(){
      const c = document.createElement('canvas');
      c.width = c.height = 256;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#8FD9A8'; ctx.fillRect(0,0,256,256);
      // scattered blotches for a lush, slightly uneven lawn look
      const blotchColors = ['#7ECB99','#9EE6B4','#84D19E'];
      for(let i=0;i<220;i++){
        ctx.fillStyle = blotchColors[i%blotchColors.length];
        ctx.globalAlpha = 0.35;
        const bx = Math.random()*256, by = Math.random()*256, br = 4+Math.random()*10;
        ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      // fine blade-like speckle
      ctx.fillStyle = '#6FC98D';
      for(let i=0;i<900;i++){
        const bx = Math.random()*256, by = Math.random()*256;
        ctx.fillRect(bx, by, 1.4, 3);
      }
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(40,40);
      tex.anisotropy = 4;
      return tex;
    }
    const groundGeo = new THREE.CircleGeometry(120, 64);
    const groundMat = new THREE.MeshStandardMaterial({map:makeGrassTexture(), roughness:1});
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI/2;
    ground.receiveShadow = true;
    scene.add(ground);

    function addPathCircle(x,z,r,color){
      const g = new THREE.CircleGeometry(r, 40);
      const m = new THREE.MeshStandardMaterial({color: color || 0xF5DEB8, roughness:1});
      const mesh = new THREE.Mesh(g,m);
      mesh.rotation.x = -Math.PI/2;
      mesh.position.set(x, 0.02, z);
      mesh.receiveShadow = true;
      scene.add(mesh);
    }

    // ---- decoration helpers ----
    function makeStripeTexture(colorA, colorB){
      const c = document.createElement('canvas');
      c.width = 64; c.height = 64;
      const ctx = c.getContext('2d');
      ctx.fillStyle = colorA; ctx.fillRect(0,0,64,64);
      ctx.fillStyle = colorB;
      for(let i=-64;i<128;i+=16){
        ctx.beginPath();
        ctx.moveTo(i,64); ctx.lineTo(i+64,0); ctx.lineTo(i+72,0); ctx.lineTo(i+8,64);
        ctx.closePath(); ctx.fill();
      }
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(6,2);
      return tex;
    }

    function addStringLights(parent, radius, y, count, colors){
      for(let i=0;i<count;i++){
        const a = (i/count)*Math.PI*2;
        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.14,8,8), new THREE.MeshStandardMaterial({color:colors[i%colors.length], emissive:colors[i%colors.length], emissiveIntensity:0.7}));
        bulb.position.set(Math.cos(a)*radius, y, Math.sin(a)*radius);
        parent.add(bulb);
      }
    }

    function addBuntingFlags(parent, radius, y, count, colors){
      const shape = new THREE.Shape();
      shape.moveTo(0,0); shape.lineTo(0.32,0); shape.lineTo(0.16,-0.42); shape.closePath();
      const geo = new THREE.ShapeGeometry(shape);
      for(let i=0;i<count;i++){
        const a = (i/count)*Math.PI*2;
        const flag = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color:colors[i%colors.length], side:THREE.DoubleSide}));
        flag.position.set(Math.cos(a)*radius, y, Math.sin(a)*radius);
        flag.lookAt(0, y, 0);
        parent.add(flag);
      }
    }

    // central plaza
    addPathCircle(0,0,10);

    // simple decorative trees
    function addTree(x,z){
      const g = new THREE.Group();
      if(Math.random() < 0.35){
        // palm tree variant for the ocean-park feel
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.32,3.2,8), new THREE.MeshStandardMaterial({color:0xC9A46B}));
        trunk.position.y = 1.6; trunk.rotation.z = 0.08; trunk.castShadow = true;
        g.add(trunk);
        for(let i=0;i<6;i++){
          const a = (i/6)*Math.PI*2;
          const frond = new THREE.Mesh(new THREE.ConeGeometry(0.35,2.2,4), new THREE.MeshStandardMaterial({color:0x4FBF8A}));
          frond.position.set(Math.cos(a)*0.5, 3.3, Math.sin(a)*0.5);
          frond.rotation.x = Math.PI/2.4;
          frond.rotation.y = a;
          frond.castShadow = true;
          g.add(frond);
        }
      } else {
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,2,8), new THREE.MeshStandardMaterial({color:0xB07A4E}));
        trunk.position.y = 1; trunk.castShadow = true;
        const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.6,10,10), new THREE.MeshStandardMaterial({color:0x5FC98D}));
        leaves.position.y = 2.6; leaves.castShadow = true;
        g.add(trunk, leaves);
      }
      g.position.set(x,0,z);
      scene.add(g);
      return g;
    }
    for(let i=0;i<42;i++){
      const a = Math.random()*Math.PI*2;
      const r = 40 + Math.random()*62;
      const s = 0.8 + Math.random()*0.7;
      const t = addTree(Math.cos(a)*r, Math.sin(a)*r);
      if(t) t.scale.set(s,s,s);
    }

    // little fountain in the middle
    (function(){
      const base = new THREE.Mesh(new THREE.CylinderGeometry(3,3,0.6,24), new THREE.MeshStandardMaterial({color:0xffffff}));
      base.position.y = 0.3; base.castShadow = true; base.receiveShadow = true;
      const water = new THREE.Mesh(new THREE.CylinderGeometry(2.6,2.6,0.1,24), new THREE.MeshStandardMaterial({color:0x5FD3E8}));
      water.position.y = 0.62;
      // whale-tail centerpiece instead of a plain cone
      const tailGroup = new THREE.Group();
      const flukeShape = new THREE.Shape();
      flukeShape.moveTo(0,0);
      flukeShape.quadraticCurveTo(0.9,0.4,1.3,1.6);
      flukeShape.quadraticCurveTo(0.5,1.1,0,1.5);
      flukeShape.quadraticCurveTo(-0.5,1.1,-1.3,1.6);
      flukeShape.quadraticCurveTo(-0.9,0.4,0,0);
      const flukeGeo = new THREE.ExtrudeGeometry(flukeShape, {depth:0.25, bevelEnabled:true, bevelThickness:0.05, bevelSize:0.05, bevelSegments:2});
      const fluke = new THREE.Mesh(flukeGeo, new THREE.MeshStandardMaterial({color:0x2FB4C9}));
      fluke.rotation.x = -Math.PI/2.4;
      fluke.position.set(0,0.8,0);
      fluke.castShadow = true;
      tailGroup.add(fluke);
      scene.add(base, water, tailGroup);
    })();

    // starfish & seashell decorations scattered near paths
    function addStarfish(x,z,color){
      const shape = new THREE.Shape();
      const spikes = 5, outerR = 0.35, innerR = 0.15;
      for(let i=0;i<spikes*2;i++){
        const r = i%2===0 ? outerR : innerR;
        const a = (i/(spikes*2))*Math.PI*2;
        const px = Math.cos(a)*r, py = Math.sin(a)*r;
        if(i===0) shape.moveTo(px,py); else shape.lineTo(px,py);
      }
      shape.closePath();
      const star = new THREE.Mesh(new THREE.ShapeGeometry(shape), new THREE.MeshStandardMaterial({color, side:THREE.DoubleSide}));
      star.rotation.x = -Math.PI/2;
      star.position.set(x,0.05,z);
      scene.add(star);
    }
    const starColors=[0xFF9EC4,0xFFD166,0x2FB4C9];
    for(let i=0;i<24;i++){
      const a = Math.random()*Math.PI*2, r = 8+Math.random()*90;
      addStarfish(Math.cos(a)*r, Math.sin(a)*r, starColors[i%starColors.length]);
    }

    // soft rising bubble particles for a livelier, more dimensional water feel
    function makeBubbleTexture(){
      const c = document.createElement('canvas');
      c.width = c.height = 64;
      const ctx = c.getContext('2d');
      const rg = ctx.createRadialGradient(32,32,0,32,32,32);
      rg.addColorStop(0,'rgba(255,255,255,0.95)');
      rg.addColorStop(0.6,'rgba(255,255,255,0.4)');
      rg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle = rg; ctx.fillRect(0,0,64,64);
      return new THREE.CanvasTexture(c);
    }
    const bubbleTex = makeBubbleTexture();
    const bubbleSystems = [];
    function addBubbles(bx,bz,radius,count,baseY,topSpan){
      const positions = new Float32Array(count*3);
      const speeds = new Float32Array(count);
      for(let i=0;i<count;i++){
        const a = Math.random()*Math.PI*2, r = Math.random()*radius;
        positions[i*3] = bx + Math.cos(a)*r;
        positions[i*3+1] = baseY + Math.random()*topSpan;
        positions[i*3+2] = bz + Math.sin(a)*r;
        speeds[i] = 0.4 + Math.random()*0.6;
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
      const mat = new THREE.PointsMaterial({map:bubbleTex, size:0.35, transparent:true, depthWrite:false, color:0xE8FBFF});
      const points = new THREE.Points(geo, mat);
      scene.add(points);
      bubbleSystems.push({points, speeds, baseY, topSpan, count});
    }
    addBubbles(0,0,2.3,22,0.7,3);      // central fountain
    addBubbles(0,55,9,70,0.3,3.5);     // water park pool

    // decorative boundary fence marking the edge of the walkable park
    (function(){
      const postMat = new THREE.MeshStandardMaterial({color:0xffffff});
      const capMat = new THREE.MeshStandardMaterial({color:0x2FB4C9});
      const count = 56;
      const r = 85;
      for(let i=0;i<count;i++){
        const a = (i/count)*Math.PI*2;
        const post = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,1.1,8), postMat);
        post.position.set(Math.cos(a)*r, 0.55, Math.sin(a)*r);
        post.castShadow = true;
        scene.add(post);
        const cap = new THREE.Mesh(new THREE.SphereGeometry(0.16,8,8), capMat);
        cap.position.set(Math.cos(a)*r, 1.1, Math.sin(a)*r);
        scene.add(cap);
      }
      const rope = new THREE.Mesh(new THREE.TorusGeometry(r,0.05,8,64), new THREE.MeshStandardMaterial({color:0x2FB4C9}));
      rope.rotation.x = Math.PI/2;
      rope.position.y = 0.8;
      scene.add(rope);
    })();

    // welcome gate near the spawn plaza
    (function(){
      const gate = new THREE.Group();
      const postMat = new THREE.MeshStandardMaterial({color:0xFF9EC4});
      const postL = new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.35,6,10), postMat);
      postL.position.set(-5,3,0); postL.castShadow = true;
      const postR = postL.clone(); postR.position.x = 5;
      const top = new THREE.Mesh(new THREE.TorusGeometry(5.2,0.4,10,24,Math.PI), new THREE.MeshStandardMaterial({color:0xFFD166}));
      top.position.set(0,6,0); top.rotation.z = Math.PI;
      top.castShadow = true;
      gate.add(postL, postR, top);
      addBuntingFlags(gate, 5.4, 6.4, 12, [0xFF9EC4,0x8FE3FF,0xFFD166,0x9EF2C0,0xC9A0FF]);
      gate.position.set(0,0,-13);
      scene.add(gate);
    })();

    // gently bobbing balloons scattered around the park
    const balloons = [];
    (function(){

    /* ===================== ATTRACTIONS ===================== */
    const attractions = []; // {name, group, center:{x,z}, radius, active, update(dt), seat, mountOffset}

    // ---- 1. Carousel (旋轉木馬) ----
    function buildCarousel(x,z){
      const group = new THREE.Group();
      addPathCircle(x,z,9,0xFFE3A6);
      const base = new THREE.Mesh(new THREE.CylinderGeometry(6,6,0.6,24), new THREE.MeshStandardMaterial({color:0xFFD166}));

      const roof = new THREE.Mesh(new THREE.ConeGeometry(6.4,2.6,16), new THREE.MeshStandardMaterial({map:roofTex}));
      roof.position.y=6.7; roof.castShadow=true;

      addBuntingFlags(group, 6.5, 5.5, 14, [0x2FB4C9,0x8FE3FF,0xFFD166,0xFF9EC4]);
      addStringLights(group, 6.05, 0.65, 18, [0x2FB4C9,0x8FE3FF,0xFFD166]);

      const horses = [];
      for(let i=0;i<6;i++){
        const a = (i/6)*Math.PI*2;
        const hx = Math.cos(a)*4.2, hz = Math.sin(a)*4.2;
        const hg = new THREE.Group();
        const col = colors[i%colors.length];
        // dolphin/seahorse-style body (rounded, curved snout instead of a horse head)
        const body = new THREE.Mesh(new THREE.SphereGeometry(0.42,12,12), new THREE.MeshStandardMaterial({color:col}));
        body.scale.set(1.3,0.9,0.85);
        body.castShadow = true;
        const snout = new THREE.Mesh(new THREE.ConeGeometry(0.16,0.55,10), new THREE.MeshStandardMaterial({color:col}));
        snout.rotation.z = -Math.PI/2;
        snout.position.set(0.75,0.28,0);
        const dorsalFin = new THREE.Mesh(new THREE.ConeGeometry(0.16,0.4,4), new THREE.MeshStandardMaterial({color:0xffffff}));
        dorsalFin.position.set(-0.05,0.5,0);
        dorsalFin.rotation.x = Math.PI;
        const tailFin = new THREE.Mesh(new THREE.ConeGeometry(0.22,0.35,4), new THREE.MeshStandardMaterial({color:0xffffff}));
        tailFin.position.set(-0.55,0.05,0);
        tailFin.rotation.z = Math.PI/2;
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.05,8,8), new THREE.MeshStandardMaterial({color:0x3A3552}));
        eye.position.set(0.55,0.35,0.14);
        const saddle = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.1,0.5), new THREE.MeshStandardMaterial({color:0xffffff}));

        pole2.position.y = -1;
        hg.add(body, snout, dorsalFin, tailFin, eye, saddle, pole2);
        hg.position.set(hx, 1.6, hz);
        hg.lookAt(0, hg.position.y, 0);

        horses.push(hg);

    // ---- 2. Ferris Wheel (摩天輪) ----
    function buildFerrisWheel(x,z){
      const group = new THREE.Group();
      addPathCircle(x,z,10,0xE9D5FF);
      const legMat = new THREE.MeshStandardMaterial({color:0x2FB4C9});
      [[-3,0,3],[3,0,3],[-3,0,-3],[3,0,-3]].forEach(p=>{
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,9,8), legMat);
        leg.position.set(p[0],4.5,p[2]);
        leg.lookAt(0,10,0);
        leg.castShadow = true;
        group.add(leg);
      });
      const hubY = 10;
      const ringGeo = new THREE.TorusGeometry(7,0.35,10,32);
      const ring = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({color:0x2FB4C9}));
      ring.position.y = hubY;
      ring.castShadow = true;
      group.add(ring);
      addStringLights(group, 7, hubY, 16, [0x8FE3FF,0xFFD166,0x2FB4C9,0x9EF2C0]);
      const spokesMat = new THREE.MeshStandardMaterial({color:0xffffff});
      const gondolas = [];
      const N = 8;
      for(let i=0;i<N;i++){
        const spoke = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,7,6), spokesMat);
        spoke.rotation.z = Math.PI/2;
        group.add(spoke);
        const g = new THREE.Group();
        const cabColor = [0x8FE3FF,0xBFF3FF,0x9EF2C0,0xC9F0FF][i%4];
        const cab = new THREE.Mesh(new THREE.SphereGeometry(0.9,12,12), new THREE.MeshStandardMaterial({color:cabColor, transparent:true, opacity:0.75}));
        cab.scale.set(1,0.9,1);
        cab.castShadow = true;
        const rim = new THREE.Mesh(new THREE.TorusGeometry(0.9,0.08,8,16), new THREE.MeshStandardMaterial({color:0xffffff}));
        g.add(cab, rim);
        group.add(g);
        gondolas.push({mesh:g, spoke, angle:(i/N)*Math.PI*2});
      }
      group.position.set(x,0,z);
      scene.add(group);
      return {
        name:'海洋摩天輪', icon:'🎡', group, center:{x,z}, radius:10, active:false, wheelAngle:0,
        seat: gondolas[0].mesh, mountOffset: new THREE.Vector3(0,0.1,0), mountRotationY: 0,
        update(dt){
          if(this.active) this.wheelAngle += dt*0.4;
          gondolas.forEach(gd=>{
            const a = gd.angle + this.wheelAngle;
            const gx = Math.cos(a)*7, gy = hubY + Math.sin(a)*7;
            gd.mesh.position.set(gx,gy,0);
            gd.spoke.position.set(gx*0.5, hubY + (gy-hubY)*0.5, 0);
          });
        }
      };
    }

    // ---- 5. Bumper Cars (碰碰車) ----
    function buildBumperCars(x,z){
      const group = new THREE.Group();
      addPathCircle(x,z,9,0xFFD9E6);
      const fenceMat = new THREE.MeshStandardMaterial({color:0x2FB4C9});
      const fence = new THREE.Mesh(new THREE.TorusGeometry(8.6,0.2,8,40), fenceMat);
      fence.rotation.x = Math.PI/2;
      fence.position.y = 0.6;
      group.add(fence);
      // teal lagoon water surface
      const water = new THREE.Mesh(new THREE.CircleGeometry(8.3,40), new THREE.MeshStandardMaterial({color:0x5FD3E8, transparent:true, opacity:0.85}));
      water.rotation.x = -Math.PI/2; water.position.y = 0.15;
      group.add(water);
      // canopy roof on 4 poles
      const canopyPoleMat = new THREE.MeshStandardMaterial({color:0x2FB4C9});
      [[-8,-8],[8,-8],[-8,8],[8,8]].forEach(p=>{
        const pl = new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.25,7,8), canopyPoleMat);
        pl.position.set(p[0],3.5,p[1]); pl.castShadow = true;
        group.add(pl);
      });
      const canopy = new THREE.Mesh(new THREE.CylinderGeometry(11.5,11.5,0.3,4), new THREE.MeshStandardMaterial({color:0x8FE3FF, transparent:true, opacity:0.5}));
      canopy.position.y = 7; canopy.rotation.y = Math.PI/4;
      group.add(canopy);
      addStringLights(group, 8.6, 0.65, 20, [0x2FB4C9,0xFFD166,0x8FE3FF,0x9EF2C0]);
      const carColors=[0xFF9EC4,0x8FE3FF,0xFFD166,0x9EF2C0];
      const cars = [];
      for(let i=0;i<4;i++){
        const c = new THREE.Group();
        // little boat hull instead of a car
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.9,1.9,6,1,false), new THREE.MeshStandardMaterial({color:carColors[i]}));
        body.rotation.z = Math.PI/2; body.rotation.x = Math.PI/2;
        body.scale.set(1,1,0.62);
        body.position.y = 0.45; body.castShadow = true;
        const rim = new THREE.Mesh(new THREE.TorusGeometry(0.5,0.08,8,8), new THREE.MeshStandardMaterial({color:0xffffff}));
        rim.position.y = 0.75;
        const bumper = new THREE.Mesh(new THREE.TorusGeometry(1.0,0.12,8,16), new THREE.MeshStandardMaterial({color:0xffffff}));
        bumper.rotation.x = Math.PI/2; bumper.position.y = 0.25;
        const flag = new THREE.Mesh(new THREE.ConeGeometry(0.14,0.3,4), new THREE.MeshStandardMaterial({color:0xffffff}));
        flag.position.set(0,1.15,0);
        c.add(body, rim, bumper, flag);
        const a = (i/4)*Math.PI*2;
        c.position.set(x+Math.cos(a)*4, 0, z+Math.sin(a)*4);
        c.userData.dir = a + Math.PI/2;
        c.userData.speed = 2 + Math.random();
        scene.add(c);
        cars.push(c);
      }
      group.position.set(x,0,z);
      scene.add(group);
      return {
        name:'海獅碰碰船', icon:'🚤', group, center:{x,z}, radius:9, active:false,
        seat: cars[0], mountOffset: new THREE.Vector3(0,0.95,0), mountRotationY: Math.PI,
        update(dt){
          if(!this.active) return;
          cars.forEach(c=>{
            c.userData.dir += (Math.random()-0.5)*1.2*dt*3;
            const nx = c.position.x + Math.cos(c.userData.dir)*c.userData.speed*dt;
            const nz = c.position.z + Math.sin(c.userData.dir)*c.userData.speed*dt;
            const dx = nx-x, dz = nz-z;
            if(Math.sqrt(dx*dx+dz*dz) > 7.5){
              c.userData.dir += Math.PI; // bounce back
            } else {
              c.position.x = nx; c.position.z = nz;
            }
            c.rotation.y = -c.userData.dir + Math.PI/2;
          });
        }
      };
    }

    // ---- 7. Jellyfish Swing Ride (水母飛椅) ----
    function buildSwingRide(x,z){
      const group = new THREE.Group();
      addPathCircle(x,z,8,0xE0F7FF);
      const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.4,7,10), new THREE.MeshStandardMaterial({color:0x2FB4C9}));
      pole.position.y=3.5; pole.castShadow=true;
      group.add(pole);
      const dome = new THREE.Mesh(new THREE.SphereGeometry(1.6,16,16,0,Math.PI*2,0,Math.PI/2), new THREE.MeshStandardMaterial({color:0xC9A0FF, transparent:true, opacity:0.75}));
      dome.position.y = 7;
      group.add(dome);
      addStringLights(group, 1.6, 6.85, 10, [0x8FE3FF,0xFF9EC4,0xFFD166]);
      addBuntingFlags(group, 4, 0.4, 8, [0x8FE3FF,0xFF9EC4,0xFFD166,0x2FB4C9]);

      const spin = new THREE.Group();
      spin.position.y = 6.6;
      const chairColors=[0xFF9EC4,0x8FE3FF,0xFFD166,0x9EF2C0,0x2FB4C9,0xC9A0FF];
      const chairs = [];
      const N = 6;
      for(let i=0;i<N;i++){
        const a=(i/N)*Math.PI*2;
        const cg = new THREE.Group();
        const chain = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,3,4), new THREE.MeshStandardMaterial({color:0xffffff}));
        chain.position.y = -1.5;
        const seat = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,0.25,10), new THREE.MeshStandardMaterial({color:chairColors[i]}));
        seat.position.y = -3;
        seat.castShadow = true;
        cg.add(chain, seat);
        cg.userData.angle = a;
        cg.position.set(Math.cos(a)*1.4, 0, Math.sin(a)*1.4);
        spin.add(cg);
        chairs.push(cg);
      }
      group.add(spin);
      group.position.set(x,0,z);
      scene.add(group);
      return {
        name:'水母飛椅', icon:'🎐', group, center:{x,z}, radius:8, active:false,
        spinAngle:0, swingFactor:0,
        seat: chairs[0], mountOffset: new THREE.Vector3(0,-2.7,0.1), mountRotationY:0,
        update(dt){
          this.spinAngle += dt*(this.active?1.3:0.25);
          spin.rotation.y = this.spinAngle;
          const target = this.active ? 1 : 0;
          this.swingFactor += (target - this.swingFactor) * Math.min(dt*1.5,1);
          chairs.forEach(c=>{
            const a = c.userData.angle;
            const r = 1.4 + this.swingFactor*1.8;
            c.position.set(Math.cos(a)*r, 0, Math.sin(a)*r);
            c.rotation.x = Math.sin(a)*this.swingFactor*0.5;
            c.rotation.z = -Math.cos(a)*this.swingFactor*0.5;
          });
        }
      };
    }

    // ---- 8. Ring Toss stall (海洋套圈圈) ----
    function buildRingToss(x,z){
      const group = new THREE.Group();
      addPathCircle(x,z,5,0xFFF0D9);
      const counter = new THREE.Mesh(new THREE.BoxGeometry(3,1,1.2), new THREE.MeshStandardMaterial({color:0xFFD166}));
      counter.position.y=0.5; counter.castShadow=true;
      const canopyPole1 = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,2.6,8), new THREE.MeshStandardMaterial({color:0xffffff}));
      canopyPole1.position.set(-1.4,1.8,0.5);
      const canopyPole2 = canopyPole1.clone(); canopyPole2.position.x=1.4;
      const canopy = new THREE.Mesh(new THREE.BoxGeometry(3.4,0.15,1.6), new THREE.MeshStandardMaterial({map:makeStripeTexture('#FF9EC4','#FFFFFF')}));
      canopy.position.set(0,3.1,0.3);
      group.add(counter, canopyPole1, canopyPole2, canopy);
      for(let i=0;i<5;i++){
        const pin = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,0.6,8), new THREE.MeshStandardMaterial({color:[0x8FE3FF,0xFF9EC4,0xFFD166,0x9EF2C0,0xC9A0FF][i]}));
        pin.position.set(-1.2+i*0.6, 1.3, -0.3);
        group.add(pin);
      }
      const rings = [];
      for(let i=0;i<3;i++){
        const ring = new THREE.Mesh(new THREE.TorusGeometry(0.22,0.05,8,16), new THREE.MeshStandardMaterial({color:0xffffff}));
        ring.position.set(-0.8+i*0.8, 1.9, -0.3);
        ring.rotation.x = Math.PI/2;
        group.add(ring);
        rings.push(ring);
      }
      addBuntingFlags(group,1.9,3.2,6,[0xFF9EC4,0x8FE3FF,0xFFD166]);
      group.position.set(x,0,z);
      scene.add(group);
      return {
        name:'海洋套圈圈', icon:'🎯', group, center:{x,z}, radius:5, active:false, standOnly:true, t:0,
        update(dt){
          if(this.active){
            this.t += dt;
            rings.forEach((r,i)=>{ r.position.y = 1.9+Math.sin(this.t*3+i)*0.15; r.rotation.z += dt*2; });
          }
        }
      };
    }

    // ---- 9. Balloon Pop stall (海洋打氣球) ----
    function buildBalloonPop(x,z){
      const group = new THREE.Group();
      addPathCircle(x,z,5,0xE0F7FF);
      const counter = new THREE.Mesh(new THREE.BoxGeometry(3,1,1.2), new THREE.MeshStandardMaterial({color:0x8FE3FF}));
      counter.position.y=0.5; counter.castShadow=true;
      const canopyPole1 = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,2.6,8), new THREE.MeshStandardMaterial({color:0xffffff}));
      canopyPole1.position.set(-1.4,1.8,0.5);
      const canopyPole2 = canopyPole1.clone(); canopyPole2.position.x=1.4;
      const canopy = new THREE.Mesh(new THREE.BoxGeometry(3.4,0.15,1.6), new THREE.MeshStandardMaterial({map:makeStripeTexture('#2FB4C9','#FFFFFF')}));
      canopy.position.set(0,3.1,0.3);
      group.add(counter, canopyPole1, canopyPole2, canopy);
      const balloonsLocal = [];
      const bColors=[0xFF9EC4,0xFFD166,0x9EF2C0,0xC9A0FF,0x8FE3FF];
      for(let i=0;i<8;i++){
        const b = new THREE.Mesh(new THREE.SphereGeometry(0.28,10,10), new THREE.MeshStandardMaterial({color:bColors[i%bColors.length]}));
        b.position.set(-1.4+(i%4)*0.9, 1.3+Math.floor(i/4)*0.7, -0.4);
        group.add(b);
        balloonsLocal.push(b);
      }
      group.position.set(x,0,z);
      scene.add(group);
      return {
        name:'海洋打氣球', icon:'🎈', group, center:{x,z}, radius:5, active:false, standOnly:true, t:0,
        update(dt){
          if(this.active){
            this.t += dt;
            balloonsLocal.forEach((b,i)=>{ b.scale.setScalar(1+Math.sin(this.t*4+i)*0.12); });
          }
        }
      };
    }

    // ---- 10. Whack-a-mole stall (海豹打地鼠) ----
    function buildWhackAMole(x,z){
      const group = new THREE.Group();
      addPathCircle(x,z,5,0xE9FBE9);
      const cab = new THREE.Mesh(new THREE.BoxGeometry(3,1.6,1.4), new THREE.MeshStandardMaterial({color:0x9EF2C0}));
      cab.position.y=0.8; cab.castShadow=true;
      const canopy = new THREE.Mesh(new THREE.BoxGeometry(3.4,0.15,1.8), new THREE.MeshStandardMaterial({map:makeStripeTexture('#9EF2C0','#FFFFFF')}));
      canopy.position.set(0,2.9,0);
      const canopyPole1 = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,1.3,8), new THREE.MeshStandardMaterial({color:0xffffff}));
      canopyPole1.position.set(-1.4,2.2,0.6);
      const canopyPole2 = canopyPole1.clone(); canopyPole2.position.x=1.4;
      group.add(cab, canopy, canopyPole1, canopyPole2);
      const moles = [];
      for(let i=0;i<5;i++){
        const holeX = -1.2+i*0.6;
        const hole = new THREE.Mesh(new THREE.CircleGeometry(0.22,16), new THREE.MeshStandardMaterial({color:0x3A3552}));
        hole.rotation.x = -Math.PI/2; hole.position.set(holeX,1.61,0.1);
        const mole = new THREE.Mesh(new THREE.SphereGeometry(0.18,10,10), new THREE.MeshStandardMaterial({color:0xC9A46B}));
        mole.position.set(holeX,1.5,0.1);
        group.add(hole, mole);
        moles.push({mesh:mole, phase:Math.random()*10, baseY:1.5});
      }
      group.position.set(x,0,z);
      scene.add(group);
      return {
        name:'海豹打地鼠', icon:'🔨', group, center:{x,z}, radius:5, active:false, standOnly:true, t:0,
        update(dt){
          if(this.active){
            this.t += dt;
            moles.forEach(m=>{ m.mesh.position.y = m.baseY + Math.max(0,Math.sin(this.t*2.4+m.phase))*0.35; });
          }
        }
      };
    }

    // ---- 11. Hoop Toss stall (海洋投籃機) ----
    function buildHoopToss(x,z){
      const group = new THREE.Group();
      addPathCircle(x,z,5,0xFFF3E0);
      const counter = new THREE.Mesh(new THREE.BoxGeometry(3,1,1.2), new THREE.MeshStandardMaterial({color:0xFFD166}));
      counter.position.y=0.5; counter.castShadow=true;
      const backboard = new THREE.Mesh(new THREE.BoxGeometry(1.4,1,0.08), new THREE.MeshStandardMaterial({color:0xffffff}));
      backboard.position.set(0,2.3,-0.6);
      const hoop = new THREE.Mesh(new THREE.TorusGeometry(0.3,0.04,8,16), new THREE.MeshStandardMaterial({color:0xFF9EC4}));
      hoop.rotation.x = Math.PI/2;
      hoop.position.set(0,1.9,-0.4);
      const canopy = new THREE.Mesh(new THREE.BoxGeometry(3.4,0.15,1.6), new THREE.MeshStandardMaterial({map:makeStripeTexture('#FFD166','#FFFFFF')}));
      canopy.position.set(0,3.1,0.3);
      const canopyPole1 = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,2.6,8), new THREE.MeshStandardMaterial({color:0xffffff}));
      canopyPole1.position.set(-1.4,1.8,0.5);
      const canopyPole2 = canopyPole1.clone(); canopyPole2.position.x=1.4;
      group.add(counter, backboard, hoop, canopy, canopyPole1, canopyPole2);
      const ball = new THREE.Mesh(new THREE.SphereGeometry(0.14,10,10), new THREE.MeshStandardMaterial({color:0xFF9EC4}));
      ball.position.set(0.9,0.9,0.4);
      group.add(ball);
      addBuntingFlags(group,1.9,3.2,6,[0xFFD166,0xFF9EC4,0x8FE3FF]);
      group.position.set(x,0,z);
      scene.add(group);
      return {
        name:'海洋投籃機', icon:'🏀', group, center:{x,z}, radius:5, active:false, standOnly:true, t:0,
        update(dt){
          if(this.active){
            this.t += dt;
            const cycle = (this.t*0.7) % 1;
            const sx=0.9, sy=0.9, sz=0.4, ex=0, ey=1.9, ez=-0.4;
            ball.position.x = sx + (ex-sx)*cycle;
            ball.position.z = sz + (ez-sz)*cycle;
            ball.position.y = sy + (ey-sy)*cycle + Math.sin(cycle*Math.PI)*0.8;
          }
        }
      };
    }

    // ---- 12. Water Park (海洋水上樂園) ----
    function buildWaterPark(x,z){
      const group = new THREE.Group();
      addPathCircle(x,z,14,0xBFF0FF);
      const pool = new THREE.Mesh(new THREE.CircleGeometry(10,40), new THREE.MeshStandardMaterial({color:0x3FCBE0, transparent:true, opacity:0.85}));
      pool.rotation.x = -Math.PI/2; pool.position.y = 0.1;
      group.add(pool);
      const poolRim = new THREE.Mesh(new THREE.TorusGeometry(10,0.4,10,48), new THREE.MeshStandardMaterial({color:0xffffff}));
      poolRim.rotation.x = Math.PI/2; poolRim.position.y = 0.15;
      group.add(poolRim);
      const tower = new THREE.Mesh(new THREE.CylinderGeometry(1.3,1.6,7,12), new THREE.MeshStandardMaterial({color:0xFFD166}));
      tower.position.set(0,3.5,-11); tower.castShadow = true;
      group.add(tower);
      const flumeColors=[0xFF9EC4,0x8FE3FF];
      [-1,1].forEach((side,idx)=>{
        const curve = new THREE.CatmullRomCurve3([
          new THREE.Vector3(side*0.8,6.8,-11),
          new THREE.Vector3(side*2.5,5,-8),
          new THREE.Vector3(side*1.5,3,-4),
          new THREE.Vector3(side*3,1.2,0),
          new THREE.Vector3(side*2,0.6,4)
        ]);
        const tube = new THREE.Mesh(new THREE.TubeGeometry(curve,40,0.5,8,false), new THREE.MeshStandardMaterial({color:flumeColors[idx]}));
        tube.castShadow = true;
        group.add(tube);
      });
      const jets = [];
      for(let i=0;i<8;i++){
        const a=(i/8)*Math.PI*2;
        const jet = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,1,6), new THREE.MeshStandardMaterial({color:0xBFF6FF, transparent:true, opacity:0.8}));
        jet.position.set(Math.cos(a)*7, 0.6, Math.sin(a)*7);
        group.add(jet);
        jets.push(jet);
      }
      addStringLights(group, 10.4, 0.5, 20, [0x2FB4C9,0x8FE3FF,0xFFD166,0x9EF2C0]);
      group.position.set(x,0,z);
      scene.add(group);
      return {
        name:'海洋水上樂園', icon:'💦', group, center:{x,z}, radius:14, active:false, standOnly:true, t:0,
        update(dt){
          if(this.active){
            this.t += dt;
            jets.forEach((j,i)=>{ j.scale.y = 1+Math.max(0,Math.sin(this.t*3+i))*2; });
          }
        }
      };
    }

    attractions.push(buildCarousel(28,-8));
    attractions.push(buildFerrisWheel(-30,-14));
    attractions.push(buildPirateShip(-18,26));
    const slideRide = buildSlide(22,28);
    attractions.push(slideRide);
    attractions.push(buildBumperCars(0,-38));
    attractions.push(buildTeacups(38,22));
    attractions.push(buildSwingRide(-35,15));
    attractions.push(buildRingToss(12,-18));
    attractions.push(buildBalloonPop(-12,-18));
    attractions.push(buildWhackAMole(12,18));
    attractions.push(buildHoopToss(-12,10));
    attractions.push(buildWaterPark(0,55));

    /* ===================== CHARACTER ===================== */
    function buildCharacter(faceCanvasEl){
      const tex = new THREE.CanvasTexture(faceCanvasEl);
      tex.needsUpdate = true;

      const group = new THREE.Group();
      const bodyColors = [0xFF9EC4, 0x8FE3FF, 0xFFD166, 0xC9A0FF, 0x9EF2C0];
      const bodyColor = bodyColors[Math.floor(Math.random()*bodyColors.length)];

      const body = new THREE.Mesh(new THREE.SphereGeometry(0.85,20,20), new THREE.MeshStandardMaterial({color:bodyColor}));
      body.scale.set(1,0.95,0.85);
      body.position.y = 0.95;
      body.castShadow = true;
      group.add(body);

      const head = new THREE.Mesh(new THREE.SphereGeometry(0.75,24,24), new THREE.MeshStandardMaterial({color:0xFFE3C2}));
      head.position.y = 2.15;
      head.castShadow = true;
      group.add(head);

      const face = new THREE.Mesh(new THREE.CircleGeometry(0.62,32), new THREE.MeshBasicMaterial({map:tex}));
      face.position.set(0, 2.15, 0.72);
      group.add(face);

      // stubby arms
      const armMat = new THREE.MeshStandardMaterial({color:bodyColor});
      const armL = new THREE.Mesh(new THREE.SphereGeometry(0.28,10,10), armMat);
      armL.position.set(-0.95,1.05,0.1); armL.castShadow=true;
      const armR = armL.clone(); armR.position.x = 0.95;
      group.add(armL, armR);

      // stubby legs
      const legMat = new THREE.MeshStandardMaterial({color:0x6B6485});
      const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.24,0.24,0.7,10), legMat);
      legL.position.set(-0.35,0.28,0); legL.castShadow = true;
      const legR = legL.clone(); legR.position.x = 0.35;
      group.add(legL, legR);

      group.userData.parts = {armL, armR, legL, legR, body};
      group.position.set(0,0,0);
      scene.add(group);
      return group;
    }

    const character = buildCharacter(faceCanvasSrc);

    /* ===================== CONTROLS ===================== */
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    const MOVE_SPEED = 9;
    const TURN_SPEED = 2.6;
    let heading = 0; // radians
    let walkT = 0;
    let sliding = false, slideT = 0;

    let currentTarget = null; // attraction in range
    let riding = null; // attraction the player is currently mounted on

    function nearestAttraction(){
      let best = null, bestD = Infinity;
      attractions.forEach(a=>{
        const dx = character.position.x - a.center.x;
        const dz = character.position.z - a.center.z;
        const d = Math.sqrt(dx*dx+dz*dz);
        if(d < a.radius + 3 && d < bestD){ best = a; bestD = d; }
      });
      return best;
    }

    const p = character.userData.parts;

    function mount(attraction){
      riding = attraction;
      attraction.active = true;
      const seat = attraction.seat;
      seat.add(character);
      character.position.copy(attraction.mountOffset);
      character.rotation.set(0, attraction.mountRotationY || 0, 0);
      // happy "sitting down / hooray" pose
      p.legL.rotation.x = 1.1; p.legR.rotation.x = 1.1;
      p.armL.rotation.z = 0.8; p.armR.rotation.z = -0.8;
    }

    function dismount(){
      if(!riding) return;
      const worldPos = new THREE.Vector3();
      character.getWorldPosition(worldPos);
      const finished = riding;
      finished.active = false;
      finished.seat.remove(character);
      scene.add(character);
      character.visible = true;
      const dx = worldPos.x - finished.center.x, dz = worldPos.z - finished.center.z;
      const dist = Math.max(Math.sqrt(dx*dx+dz*dz), 0.001);
      const nx = finished.center.x + (dx/dist) * (finished.radius+2);
      const nz = finished.center.z + (dz/dist) * (finished.radius+2);
      character.position.set(nx, 0, nz);
      character.rotation.set(0, heading, 0);
      p.legL.rotation.x = 0; p.legR.rotation.x = 0;
      p.armL.rotation.z = 0; p.armR.rotation.z = 0;
      riding = null;
    }

    function handleInteract(){
      if(riding){ dismount(); return; }
      if(sliding || !currentTarget) return;
      if(currentTarget === slideRide){
        sliding = true; slideT = 0;
      } else if(currentTarget.standOnly){
        currentTarget.active = !currentTarget.active;
      } else if(currentTarget.seat){
        mount(currentTarget);
      }
    }

    window.addEventListener('keydown', e=>{
      if(e.key.toLowerCase() === 'e') handleInteract();
    });
    promptEl.addEventListener('click', handleInteract);

    /* ===================== CAMERA FOLLOW ===================== */
    const camOffset = new THREE.Vector3(0, 4.2, 8.5);
    const camLookOffset = new THREE.Vector3(0, 2, 0);
    const tmpVec = new THREE.Vector3();

    /* ===================== MAIN LOOP ===================== */
    const clock = new THREE.Clock();

    const worldPosTmp = new THREE.Vector3();

    function update(dt, t){
      // --- movement ---
      if(!sliding && !riding){
        let turning = 0;
        if(keys['arrowleft'] || keys['a']) turning += 1;
        if(keys['arrowright'] || keys['d']) turning -= 1;
        heading += turning * TURN_SPEED * dt;

        let moveDir = 0;
        if(keys['arrowup'] || keys['w']) moveDir -= 1;
        if(keys['arrowdown'] || keys['s']) moveDir += 1;

        if(moveDir !== 0){
          character.position.x += Math.sin(heading) * moveDir * MOVE_SPEED * dt;
          character.position.z += Math.cos(heading) * moveDir * MOVE_SPEED * dt;
          walkT += dt * 10;
        }
        // keep inside park
        const distFromCenter = Math.sqrt(character.position.x**2 + character.position.z**2);
        if(distFromCenter > 85){
          const s = 85/distFromCenter;
          character.position.x *= s; character.position.z *= s;
        }
        character.rotation.y = heading;

        // simple walk-cycle wiggle, plus a gentle idle "breathing" bob when standing still
        const swing = moveDir !== 0 ? Math.sin(walkT)*0.5 : 0;
        p.legL.rotation.x = swing;
        p.legR.rotation.x = -swing;
        p.armL.position.y = 1.05 + Math.sin(walkT)*0.05;
        p.armR.position.y = 1.05 - Math.sin(walkT)*0.05;
        const bob = moveDir !== 0 ? Math.abs(Math.sin(walkT))*0.12 : Math.sin(t*2)*0.04;
        p.body.position.y = 0.95 + bob;
      } else if(sliding){
        // scripted slide-down animation
        slideT += dt/1.6;
        if(slideT >= 1){ sliding = false; }
        else {
          const a = Math.min(slideT,1);
          character.position.lerpVectors(slideRide.top, slideRide.bottom, a);
        }
      }

      // --- attractions (must update before camera so mounted seat position is fresh) ---
      attractions.forEach(a => a.update(dt,t));

      // --- balloons ---
      balloons.forEach(b=>{ b.position.y = b.userData.baseY + Math.sin(t*1.5+b.userData.phase)*0.3; });

      // --- bubbles ---
      bubbleSystems.forEach(sys=>{
        const pos = sys.points.geometry.attributes.position;
        for(let i=0;i<sys.count;i++){
          let y = pos.getY(i) + sys.speeds[i]*dt;
          if(y > sys.baseY + sys.topSpan) y = sys.baseY;
          pos.setY(i,y);
        }
        pos.needsUpdate = true;
      });

      // --- drifting clouds ---
      cloudGroup.children.forEach(c=>{
        c.position.x += c.userData.speed*dt;
        if(c.position.x > 150) c.position.x = -150;
      });

      // --- camera ---
      character.getWorldPosition(worldPosTmp);
      if(riding){
        tmpVec.set(worldPosTmp.x, worldPosTmp.y+4.5, worldPosTmp.z+9);
        camera.position.lerp(tmpVec, 1 - Math.pow(0.0005, dt));
        camera.lookAt(worldPosTmp.x, worldPosTmp.y+0.8, worldPosTmp.z);
      } else {
        const rotOffset = camOffset.clone();
        const cos = Math.cos(heading), sin = Math.sin(heading);
        const rx = rotOffset.x*cos + rotOffset.z*sin;
        const rz = -rotOffset.x*sin + rotOffset.z*cos;
        const bobY = (!sliding) ? Math.abs(Math.sin(walkT))*0.1 : 0;
        tmpVec.set(worldPosTmp.x + rx, worldPosTmp.y + rotOffset.y + bobY, worldPosTmp.z + rz);
        camera.position.lerp(tmpVec, 1 - Math.pow(0.001, dt));
        camera.lookAt(worldPosTmp.x, worldPosTmp.y + camLookOffset.y, worldPosTmp.z);
      }

      // --- interaction prompt ---
      if(riding){
        promptEl.classList.add('show');
        promptEl.innerHTML = (riding.icon||'🎉') + ' 玩得開心！按 <kbd>E</kbd> 下車';
      } else {
        currentTarget = sliding ? null : nearestAttraction();
        if(currentTarget){
          promptEl.classList.add('show');
          if(currentTarget === slideRide){
            promptEl.innerHTML = (currentTarget.icon||'') + ' 按 <kbd>E</kbd> 玩 ' + currentTarget.name;
          } else if(currentTarget.standOnly){
            promptEl.innerHTML = (currentTarget.icon||'') + ' 按 <kbd>E</kbd> ' + (currentTarget.active ? '停止' : '開始') + currentTarget.name;
          } else {
            promptEl.innerHTML = (currentTarget.icon||'') + ' 按 <kbd>E</kbd> 坐上 ' + currentTarget.name;
          }
        } else {
          promptEl.classList.remove('show');
        }
      }
    }

    function animate(){
      const dt = Math.min(clock.getDelta(), 0.05);
      const t = clock.elapsedTime;
      update(dt, t);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  }

})();
</script>
